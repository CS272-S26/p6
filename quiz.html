<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet"/>
    <title>Quiz</title>
</head>
<body>
    <header>
        <h1 id="webTitle">Simple Math Learning Tool</h1>
        <nav class="navbar navbar-expand-md">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link" href="aboutus.html">About Us</a>
                    </li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link" href="addition.html">Addition</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="subtraction.html">Subtraction</a>
                    </li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link" href="multiplication.html">Multiplication</a>
                    </li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link" href="division.html">Division</a>
                    </li class="nav-item">
                    <li class="nav-item">
                        <a class="nav-link active" href="quiz.html">Quiz</a>
                    </li class="nav-item">
                </ul>
            </nav>
    </header>   
    <h1>Quiz</h1>
    <p></p>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
                <div id="addCard" class="card m-2 p-2">
                    <h4><b>Addition Problems</b></h4>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-6">
                <div id="subCard" class="card m-2 p-2">
                    <h4><b>Subtraction Problems</b></h4>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-6">
                <div id="multiCard" class="card m-2 p-2">
                    <h4><b>Multiplication Problems</b></h4>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-6">
                <div id="divCard" class="card m-2 p-2">
                    <h4><b>Division Problems</b></h4>
                </div>
            </div>
        </div>
        <div class="m-2 p-2">
            <h3 id="finalScore"></h3>
            <button id="submitQuiz" class="btn btn-primary" type="button">Submit Quiz</button>
        </div>
    </div>        
    <script>
        let quizQuestions = [];
        const answerNodes = [];
        const feedbackNodes = [];

        fetch("https://raw.githubusercontent.com/CS272-S26/p6/refs/heads/main/questions")
        .then(res => res.json())
        .then(questions => {
            quizQuestions = questions;
            quizQuestions.forEach((q, index) => appendQuestions(q, index));
        })

        document.getElementById("submitQuiz").addEventListener("click", gradeQuiz);

        function appendQuestions(q, index) {
            let cardNode = null;

            if (q.type === "addition") {
                cardNode = document.getElementById("addCard");
            } else if (q.type === "subtraction") {
                cardNode = document.getElementById("subCard");
            } else if (q.type === "multiplication") {
                cardNode = document.getElementById("multiCard");
            } else if (q.type === "division") {
                cardNode = document.getElementById("divCard");
            }

            if (cardNode === null) {
                return;
            }

            const problemNode = document.createElement("div");
            problemNode.classList.add("mb-3");

            const questionNode = document.createElement("p");
            questionNode.innerText = q.question;

            const answerNode = document.createElement("input");
            answerNode.classList.add("form-control");
            answerNode.type = "number";
            answerNode.placeholder = "Enter your answer here!";
            answerNode.value = sessionStorage.getItem(`quizAnswer${index}`) || "";

            const feedbackNode = document.createElement("p");
            feedbackNode.classList.add("mt-1");

            answerNode.addEventListener("input", () => {
                sessionStorage.setItem(`quizAnswer${index}`, answerNode.value);
            });

            problemNode.appendChild(questionNode);
            problemNode.appendChild(answerNode);
            problemNode.appendChild(feedbackNode);
            cardNode.appendChild(problemNode);

            answerNodes[index] = answerNode;
            feedbackNodes[index] = feedbackNode;
        }

        function gradeQuiz() {
            let score = 0;

            quizQuestions.forEach((q, index) => {
                const userAnswer = answerNodes[index].value.trim();
                const feedbackNode = feedbackNodes[index];

                feedbackNode.classList.remove("text-success", "text-danger");

                if (userAnswer !== "" && Number(userAnswer) === Number(q.answer)) {
                    score++;
                    feedbackNode.innerText = "correct";
                    feedbackNode.classList.add("text-success");
                } else {
                    feedbackNode.innerText = "incorrect";
                    feedbackNode.classList.add("text-danger");
                }
            });

            document.getElementById("finalScore").innerText = `Final Score: ${score}/${quizQuestions.length}`;
        }

    </script>
</body>
</html>
